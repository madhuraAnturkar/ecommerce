#DB config
spring.datasource.url=jdbc:mysql://localhost:3306/order_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
#default server port 8080
server.port=9090
#custom prop stock checking URL of inventory
#inventory.stock.check=http://localhost:8080/inventory/check/{skuCode}/{qty}
#custom property
#stock.check.url=http://inventory-service/inventory/check/{sku_code}/{quantity}
